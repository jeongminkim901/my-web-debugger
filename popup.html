<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { font-family: sans-serif; width: 240px; padding: 12px; }
      button { width: 100%; margin: 6px 0; padding: 10px; cursor: pointer; }
      #recBadge {
        display:inline-block;
        padding:4px 10px;
        border-radius:999px;
        font-size:12px;
        border:1px solid #ccc;
        margin-bottom:10px;
      }
      #status { margin-top:10px; font-size:12px; color:#666; min-height: 18px; }
    </style>
  </head>
  <body>
    <div id="recBadge">● OFF</div>

    <button id="start">Start Recording</button>
    <button id="stop">Stop Recording</button>

    <button id="openViewer">Open Viewer (바로 보기)</button>
    <button id="export">Export JSON (파일 저장)</button>

    <div id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
